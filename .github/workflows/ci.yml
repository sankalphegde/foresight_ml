name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    name: Lint, Typecheck, Security, Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Print OIDC context
        run: |
          echo "repository=${{ github.repository }}"
          echo "repository_owner=${{ github.repository_owner }}"
          echo "ref=${{ github.ref }}"
          echo "workflow=${{ github.workflow }}"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/771179250808/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@financial-distress-ew.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Install dependencies
        run: make setup

      - name: Run lint + type checks
        run: make check

      - name: Run tests
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: make test

      # --- Added for model phase ---
      - name: Test coverage gate
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          uv pip install pytest-cov
          uv run pytest tests/ --cov=src --cov-report=xml --cov-fail-under=45

      - name: Security scan (Bandit)
        run: |
          uv pip install bandit
          uv run bandit -r src/ -ll --exit-zero

      - name: Dependency vulnerability scan
        run: |
          uv pip install pip-audit
          uv run pip-audit

      - name: Validate DVC remote config
        run: uv run dvc config --list